<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A+Prep — Study</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:      #4f6ef7;
      --blue-dark: #3a56d4;
      --cream:     #f7f8fc;
      --dark:      #1e1e2e;
      --gray:      #6b7280;
      --border:    #e5e7eb;
      --green:     #22c55e;
      --red:       #ef4444;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--cream);
      min-height: 100vh;
      color: var(--dark);
    }

    nav {
      background: white;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .nav-logo {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--dark);
      text-decoration: none;
    }

    .nav-logo span { color: var(--blue); }
    .nav-right { display: flex; align-items: center; gap: 1rem; }

    .btn-back {
      padding: .5rem 1.25rem;
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: .85rem;
      font-weight: 600;
      color: var(--gray);
      cursor: pointer;
      text-decoration: none;
      transition: all .2s;
    }

    .btn-back:hover { border-color: var(--blue); color: var(--blue); }

    .btn-logout {
      padding: .5rem 1.25rem;
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: .85rem;
      font-weight: 600;
      color: var(--gray);
      cursor: pointer;
      transition: all .2s;
    }

    .btn-logout:hover { border-color: var(--red); color: var(--red); }

    main {
      max-width: 720px;
      margin: 3rem auto;
      padding: 0 1.5rem;
    }

    .breadcrumb {
      font-size: .85rem;
      color: var(--gray);
      margin-bottom: 1.5rem;
    }

    .breadcrumb a { color: var(--blue); text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }

    .progress-label {
      font-size: .85rem;
      color: var(--gray);
      margin-bottom: .5rem;
      display: flex;
      justify-content: space-between;
    }

    .progress-bar-wrap {
      background: var(--border);
      border-radius: 999px;
      height: 8px;
      margin-bottom: 2rem;
      overflow: hidden;
    }

    .progress-bar {
      background: var(--blue);
      height: 100%;
      border-radius: 999px;
      transition: width .4s ease;
    }

    .score-tracker {
      display: flex;
      gap: 1.25rem;
      margin-bottom: 1.5rem;
      font-size: .88rem;
      font-weight: 600;
    }

    .score-correct { color: #16a34a; }
    .score-wrong   { color: var(--red); }

    .q-card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,.07);
      padding: 2.5rem;
    }

    .q-meta {
      display: flex;
      align-items: center;
      gap: .5rem;
      margin-bottom: .75rem;
    }

    .q-number {
      font-size: .8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--blue);
    }

    .q-difficulty {
      font-size: .75rem;
      font-weight: 700;
      padding: .2rem .65rem;
      border-radius: 999px;
      text-transform: capitalize;
    }

    .q-difficulty.easy   { background: #dcfce7; color: #16a34a; }
    .q-difficulty.medium { background: #fef9c3; color: #ca8a04; }
    .q-difficulty.hard   { background: #fee2e2; color: #dc2626; }

    .q-text {
      font-size: 1.2rem;
      font-weight: 700;
      line-height: 1.5;
      margin-bottom: 2rem;
    }

    /* Options */
    .options {
      display: flex;
      flex-direction: column;
      gap: .75rem;
      margin-bottom: 1.5rem;
    }

    .option-btn {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
      border: 2px solid var(--border);
      border-radius: 12px;
      background: white;
      cursor: pointer;
      text-align: left;
      font-size: .95rem;
      font-weight: 500;
      color: var(--dark);
      transition: all .15s;
      width: 100%;
    }

    .option-btn:hover:not(:disabled) {
      border-color: var(--blue);
      background: #f0f4ff;
    }

    .option-btn .letter {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--cream);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: .85rem;
      flex-shrink: 0;
      transition: all .15s;
    }

    .option-btn.correct {
      border-color: var(--green);
      background: #f0fdf4;
      cursor: default;
    }

    .option-btn.correct .letter {
      background: var(--green);
      border-color: var(--green);
      color: white;
    }

    .option-btn.wrong {
      border-color: var(--red);
      background: #fef2f2;
      cursor: default;
      opacity: .7;
    }

    .option-btn.wrong .letter {
      background: var(--red);
      border-color: var(--red);
      color: white;
    }

    .option-btn:disabled { cursor: default; }

    /* Action buttons row */
    .action-row {
      display: none;
      align-items: center;
      gap: .75rem;
      margin-top: 1.5rem;
    }

    .action-row.visible { display: flex; }

    .btn-explanation {
      flex: 1;
      padding: .85rem 1rem;
      background: #eff6ff;
      color: var(--blue);
      border: 2px solid #bfdbfe;
      border-radius: 12px;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
    }

    .btn-explanation:hover {
      background: #dbeafe;
    }

    .btn-next-arrow {
      width: 54px;
      height: 54px;
      background: var(--blue);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all .2s;
    }

    .btn-next-arrow:hover { background: var(--blue-dark); transform: translateX(2px); }

    /* Explanation box */
    .explanation-box {
      display: none;
      background: #eff6ff;
      border: 1.5px solid #bfdbfe;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-top: 1rem;
      font-size: .92rem;
      color: var(--dark);
      line-height: 1.6;
    }

    .explanation-box.visible { display: block; }

    /* Completed */
    .completed {
      text-align: center;
      background: white;
      border-radius: 20px;
      padding: 3rem 2rem;
      box-shadow: 0 4px 24px rgba(0,0,0,.07);
      display: none;
    }

    .completed .trophy { font-size: 4rem; margin-bottom: 1rem; }

    .completed h2 {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: .5rem;
    }

    .completed p { color: var(--gray); margin-bottom: .5rem; }

    .final-score {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--blue);
      margin: 1rem 0 2rem;
    }

    .btn-restart {
      background: var(--blue);
      color: white;
      padding: .85rem 2rem;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      cursor: pointer;
      margin-right: .75rem;
      transition: all .2s;
    }

    .btn-restart:hover { background: var(--blue-dark); }

    .btn-home {
      background: var(--cream);
      color: var(--dark);
      padding: .85rem 2rem;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      border: 1.5px solid var(--border);
      text-decoration: none;
      display: inline-block;
      transition: all .2s;
    }

    .btn-home:hover { border-color: var(--blue); color: var(--blue); }

    .loading {
      text-align: center;
      color: var(--gray);
      padding: 3rem;
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="dashboard.html">A+<span>Prep</span></a>
    <div class="nav-right">
      <a class="btn-back" id="backBtn" href="grades.html">← Back</a>
      <button class="btn-logout" id="logoutBtn">Log Out</button>
    </div>
  </nav>

  <main>
    <div class="breadcrumb" id="breadcrumb"></div>
    <div id="studyArea"><div class="loading">Loading questions…</div></div>
    <div class="completed" id="completedCard">
      <div class="trophy">🏆</div>
      <h2>Topic Complete!</h2>
      <p id="completedMsg"></p>
      <div class="final-score" id="finalScore"></div>
      <div>
        <button class="btn-restart" id="restartBtn">Study Again</button>
        <a class="btn-home" id="backToTopics" href="grades.html">Choose Another Topic</a>
      </div>
    </div>
  </main>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

  const SUPABASE_URL = 'https://anookzojonxupbcmwqfg.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFub29rem9qb254dXBiY213cWZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NzY3NzUsImV4cCI6MjA5MTM1Mjc3NX0.HoluuUkQu6cK4nCKQnsiPZoZB1b2yIEjk3Y227k3awQ';
  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

  const { data: { session } } = await supabase.auth.getSession();
  if (!session) { window.location.href = 'index.html'; }

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await supabase.auth.signOut();
    window.location.href = 'index.html';
  });

  const params      = new URLSearchParams(window.location.search);
  const topicId     = params.get('topic');
  const topicName   = params.get('topicName')   || 'Topic';
  const subjectId   = params.get('subject');
  const subjectName = params.get('subjectName') || 'Subject';
  const gradeId     = params.get('grade');
  const gradeName   = params.get('gradeName')   || 'Grade';

  if (!topicId) { window.location.href = 'grades.html'; }

  const topicsUrl = `topics.html?subject=${subjectId}&subjectName=${encodeURIComponent(subjectName)}&grade=${gradeId}&gradeName=${encodeURIComponent(gradeName)}`;

  document.getElementById('backBtn').href      = topicsUrl;
  document.getElementById('backToTopics').href = topicsUrl;
  document.getElementById('breadcrumb').innerHTML = `
    <a href="grades.html">Grades</a> ›
    <a href="subjects.html?grade=${gradeId}&gradeName=${encodeURIComponent(gradeName)}">${gradeName}</a> ›
    <a href="${topicsUrl}">${subjectName}</a> ›
    ${topicName}
  `;

  const { data: questions, error } = await supabase
    .from('questions')
    .select('*')
    .eq('topic_id', topicId)
    .order('created_at');

  const studyArea = document.getElementById('studyArea');

  if (error || !questions) {
    studyArea.innerHTML = '<p style="color:#ef4444">Failed to load questions.</p>';
  } else if (!questions.length) {
    studyArea.innerHTML = '<p style="color:var(--gray);text-align:center;padding:3rem">No questions available for this topic yet.</p>';
  } else {
    let current = 0;
    let correct = 0;
    let wrong   = 0;

    function render() {
      if (current >= questions.length) {
        studyArea.style.display = 'none';
        const completed = document.getElementById('completedCard');
        completed.style.display = 'block';
        document.getElementById('completedMsg').textContent =
          `You finished all ${questions.length} question${questions.length > 1 ? 's' : ''} in ${topicName}.`;
        document.getElementById('finalScore').textContent =
          `✅ ${correct} correct  ·  ❌ ${wrong} incorrect`;
        return;
      }

      const q   = questions[current];
      const pct = Math.round((current / questions.length) * 100);
      const opts = [
        { letter: 'a', label: 'A', text: q.option_a },
        { letter: 'b', label: 'B', text: q.option_b },
        { letter: 'c', label: 'C', text: q.option_c },
        { letter: 'd', label: 'D', text: q.option_d },
      ].filter(o => o.text);

      studyArea.innerHTML = `
        <div class="score-tracker">
          <span class="score-correct">✅ ${correct} correct</span>
          <span class="score-wrong">❌ ${wrong} incorrect</span>
        </div>
        <div class="progress-label">
          <span>Question ${current + 1} of ${questions.length}</span>
          <span>${pct}%</span>
        </div>
        <div class="progress-bar-wrap">
          <div class="progress-bar" style="width:${pct}%"></div>
        </div>

        <div class="q-card">
          <div class="q-meta">
            <span class="q-number">Question ${current + 1}</span>
            <span class="q-difficulty ${q.difficulty || 'medium'}">${q.difficulty || 'medium'}</span>
          </div>
          <div class="q-text">${q.question}</div>

          <div class="options" id="options">
            ${opts.map(o => `
              <button class="option-btn" data-letter="${o.letter}">
                <span class="letter">${o.label}</span>
                <span>${o.text}</span>
              </button>
            `).join('')}
          </div>

          <div class="action-row" id="actionRow">
            <button class="btn-explanation" id="btnExplanation">💡 Explanation</button>
            <button class="btn-next-arrow" id="btnNext" title="Next question">→</button>
          </div>

          <div class="explanation-box" id="explanationBox">
            ${q.explanation || ''}
          </div>
        </div>
      `;

      let answered  = false;
      let wrongCount = 0;
      const totalOpts = opts.length;

      function revealAnswer() {
        // Disable all, highlight correct
        document.querySelectorAll('.option-btn').forEach(b => {
          b.disabled = true;
          if (b.dataset.letter === q.correct_option) b.classList.add('correct');
        });
        document.getElementById('actionRow').classList.add('visible');
      }

      document.querySelectorAll('.option-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          if (answered) return;
          const chosen  = btn.dataset.letter;
          const isRight = chosen === q.correct_option;

          if (isRight) {
            answered = true;
            correct++;
            btn.classList.add('correct');
            btn.disabled = true;
            // Disable remaining
            document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
            document.getElementById('actionRow').classList.add('visible');
          } else {
            wrongCount++;
            wrong++;
            btn.classList.add('wrong');
            btn.disabled = true;

            // If all wrong options exhausted, reveal correct
            if (wrongCount >= totalOpts - 1) {
              answered = true;
              revealAnswer();
            }
          }
        });
      });

      // Explanation toggle
      document.getElementById('btnExplanation').addEventListener('click', () => {
        const box = document.getElementById('explanationBox');
        const btn = document.getElementById('btnExplanation');
        box.classList.toggle('visible');
        btn.textContent = box.classList.contains('visible') ? '💡 Hide Explanation' : '💡 Explanation';
      });

      // Next arrow
      document.getElementById('btnNext').addEventListener('click', () => {
        current++;
        render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    }

    render();

    document.getElementById('restartBtn').addEventListener('click', () => {
      current = 0;
      correct = 0;
      wrong   = 0;
      document.getElementById('completedCard').style.display = 'none';
      studyArea.style.display = 'block';
      render();
    });
  }
</script>

</body>
</html>
