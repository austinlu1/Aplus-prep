<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A+Prep — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:      #4f6ef7;
      --blue-dark: #3a56d4;
      --cream:     #f7f8fc;
      --dark:      #1e1e2e;
      --gray:      #6b7280;
      --border:    #e5e7eb;
      --red:       #ef4444;
      --green:     #22c55e;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(0,0,0,.1);
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
    }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo h1 {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--dark);
    }

    .logo h1 span { color: var(--blue); }

    .logo p {
      color: var(--gray);
      font-size: .9rem;
      margin-top: .25rem;
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: var(--cream);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 1.75rem;
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: .6rem;
      border-radius: 8px;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--gray);
      transition: all .2s;
      border: none;
      background: transparent;
    }

    .tab.active {
      background: white;
      color: var(--dark);
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }

    /* Form */
    .form { display: none; flex-direction: column; gap: 1rem; }
    .form.active { display: flex; }

    label {
      font-size: .85rem;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: .25rem;
      display: block;
    }

    input {
      width: 100%;
      padding: .75rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: .95rem;
      color: var(--dark);
      outline: none;
      transition: border-color .2s;
      background: white;
    }

    input:focus { border-color: var(--blue); }

    .btn {
      width: 100%;
      padding: .85rem;
      background: var(--blue);
      color: white;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background .2s, transform .15s;
      margin-top: .25rem;
    }

    .btn:hover { background: var(--blue-dark); transform: translateY(-1px); }
    .btn:disabled { background: #a0aec0; cursor: not-allowed; transform: none; }

    .message {
      font-size: .85rem;
      padding: .75rem 1rem;
      border-radius: 8px;
      display: none;
      text-align: center;
    }

    .message.error   { background: #fef2f2; color: var(--red);   display: block; }
    .message.success { background: #f0fdf4; color: #16a34a;      display: block; }

    .divider {
      text-align: center;
      color: var(--gray);
      font-size: .8rem;
      margin: .5rem 0;
      position: relative;
    }

    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: var(--border);
    }

    .divider::before { left: 0; }
    .divider::after  { right: 0; }

    .footer-text {
      text-align: center;
      font-size: .82rem;
      color: var(--gray);
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <h1>A+<span>Prep</span></h1>
    <p>Your personal learning platform</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Log In</button>
    <button class="tab" onclick="switchTab('signup')">Sign Up</button>
  </div>

  <!-- LOGIN FORM -->
  <form class="form active" id="loginForm" onsubmit="handleLogin(event)">
    <div>
      <label for="loginEmail">Email</label>
      <input type="email" id="loginEmail" placeholder="you@example.com" required />
    </div>
    <div>
      <label for="loginPassword">Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••" required />
    </div>
    <div class="message" id="loginMsg"></div>
    <button class="btn" type="submit" id="loginBtn">Log In</button>
  </form>

  <!-- SIGNUP FORM -->
  <form class="form" id="signupForm" onsubmit="handleSignup(event)">
    <div>
      <label for="signupName">Full Name</label>
      <input type="text" id="signupName" placeholder="Jane Smith" required />
    </div>
    <div>
      <label for="signupEmail">Email</label>
      <input type="email" id="signupEmail" placeholder="you@example.com" required />
    </div>
    <div>
      <label for="signupPassword">Password</label>
      <input type="password" id="signupPassword" placeholder="At least 6 characters" minlength="6" required />
    </div>
    <div class="message" id="signupMsg"></div>
    <button class="btn" type="submit" id="signupBtn">Create Account</button>
  </form>

  <p class="footer-text">By signing up you agree to our terms of service.</p>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

  const SUPABASE_URL = 'https://anookzojonxupbcmwqfg.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFub29rem9qb254dXBiY213cWZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NzY3NzUsImV4cCI6MjA5MTM1Mjc3NX0.HoluuUkQu6cK4nCKQnsiPZoZB1b2yIEjk3Y227k3awQ';

  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

  // If already logged in, go straight to dashboard
  const { data: { session } } = await supabase.auth.getSession();
  if (session) window.location.href = 'dashboard.html';

  // Tab switching
  window.switchTab = (tab) => {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0) === (tab === 'login'));
    });
    document.getElementById('loginForm').classList.toggle('active', tab === 'login');
    document.getElementById('signupForm').classList.toggle('active', tab === 'signup');
  };

  // Login
  window.handleLogin = async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const msg = document.getElementById('loginMsg');
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;

    btn.disabled = true;
    btn.textContent = 'Logging in…';
    msg.className = 'message';

    const { error } = await supabase.auth.signInWithPassword({ email, password });

    if (error) {
      msg.textContent = error.message;
      msg.className = 'message error';
      btn.disabled = false;
      btn.textContent = 'Log In';
    } else {
      window.location.href = 'dashboard.html';
    }
  };

  // Signup
  window.handleSignup = async (e) => {
    e.preventDefault();
    const btn = document.getElementById('signupBtn');
    const msg = document.getElementById('signupMsg');
    const name     = document.getElementById('signupName').value.trim();
    const email    = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;

    btn.disabled = true;
    btn.textContent = 'Creating account…';
    msg.className = 'message';

    const { error } = await supabase.auth.signUp({
      email,
      password,
      options: { data: { full_name: name } }
    });

    if (error) {
      msg.textContent = error.message;
      msg.className = 'message error';
      btn.disabled = false;
      btn.textContent = 'Create Account';
    } else {
      msg.textContent = 'Account created! Check your email to confirm, then log in.';
      msg.className = 'message success';
      btn.textContent = 'Done!';
    }
  };
</script>

</body>
</html>
